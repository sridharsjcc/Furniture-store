<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>

<style>
body{
  font-family:Arial;
  text-align:center;
  margin-top:100px;
}

button{
  padding:15px 25px;
  font-size:18px;
  background:orange;
  border:none;
  cursor:pointer;
}
</style>

</head>

<body>

<h2>🧾 Checkout</h2>

<button onclick="order()">Place Order</button>

<script>

const BASE="https://furniturebackend-adua.onrender.com";
const token=localStorage.getItem("token");

function order(){

fetch(BASE+"/place-order",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":token
}
})
.then(res=>res.text())
.then(msg=>{
alert(msg);

if(msg.includes("✅")){
  window.location.href="orders.html";
}

});

}

</script>

</body>
</html>
