<!DOCTYPE html>
<html>
<body>

<h2>🧾 Checkout</h2>

<button onclick="order()">Place Order</button>
<br><br>
<a href="index.html">⬅ Back to Home</a>

<script>

const BASE = "https://furniturebackend-adua.onrender.com";
const token = localStorage.getItem("token");

function order(){

if(!token){
  alert("Login first ❌");
  return;
}

fetch(BASE + "/place-order",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":token
}
})
.then(res=>res.text())
.then(msg=>{
  alert(msg);
  window.location.href="orders.html";
});

}

</script>

</body>
</html>
