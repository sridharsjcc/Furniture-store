<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>

<style>
body{font-family:Arial;background:#f1f3f6;padding:40px;}
.box{background:white;padding:20px;border-radius:10px;width:300px;margin:auto;}
button{width:100%;padding:10px;background:orange;border:none;}
</style>
</head>

<body>

<div class="box">

<h2>Checkout</h2>

<input id="address" placeholder="Address"><br><br>

<select id="payment">
<option>UPI</option>
<option>Card</option>
<option>Cash</option>
</select><br><br>

<button onclick="placeOrder()">Place Order</button>

</div>

<script>

const token=localStorage.getItem("token");

function placeOrder(){

fetch("http://localhost:3000/place-order",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":token
}
})
.then(res=>res.text())
.then(msg=>{
alert(msg);
window.location.href="orders.html";
});
}

</script>

</body>
</html>
