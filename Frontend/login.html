<!DOCTYPE html>
<html>
<body>

<h2>Login</h2>

<input id="u">
<input id="p">

<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>

<script>

const BASE="https://furniturebackend-adua.onrender.com";

function signup(){
fetch(BASE+"/signup",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:u.value,password:p.value})
}).then(r=>r.text()).then(alert);
}

function login(){
fetch(BASE+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:u.value,password:p.value})
})
.then(r=>r.json())
.then(d=>{
localStorage.setItem("token",d.token);
alert("Logged in");
location="index.html";
});
}

</script>

</body>
</html>
