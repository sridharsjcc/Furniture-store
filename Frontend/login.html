<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#f1f3f6;
}

.box{
  background:white;
  padding:20px;
  border-radius:10px;
  width:300px;
  text-align:center;
}

input{
  width:90%;
  padding:10px;
  margin:10px;
}

button{
  padding:10px;
  width:100%;
  margin-top:5px;
  cursor:pointer;
}

button:hover{
  background:#ddd;
}
</style>
</head>

<body>

<div class="box">
<h2>Login</h2>

<input id="u" placeholder="Username">
<input id="p" type="password" placeholder="Password">

<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>

<br><br>
<a href="index.html">⬅ Back to Home</a>
</div>

<script>

const BASE="https://furniturebackend-adua.onrender.com";

// SIGNUP
function signup(){

if(!u.value || !p.value){
  alert("Enter username & password ❗");
  return;
}

fetch(BASE+"/signup",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    username:u.value,
    password:p.value
  })
})
.then(res=>res.text())
.then(msg=>{
  alert(msg);
});

}

// LOGIN
function login(){

if(!u.value || !p.value){
  alert("Enter username & password ❗");
  return;
}

fetch(BASE+"/login",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    username:u.value,
    password:p.value
  })
})
.then(res=>res.json())
.then(data=>{

  // ❌ error handling
  if(!data.token){
    alert("Invalid login ❌");
    return;
  }

  // ✅ store token
  localStorage.setItem("token", data.token);

  alert("Login success ✅");

  // 👑 CHECK ADMIN
  const user = JSON.parse(atob(data.token.split('.')[1]));

  if(user.isAdmin){
    window.location = "admin.html"; // 👉 go to admin panel
  }else{
    window.location = "index.html";
  }

})
.catch(()=>{
  alert("Server error ❌");
});

}

</script>

</body>
</html>
