<script>

const BASE = "https://furniturebackend-adua.onrender.com"; // ✅ correct backend

function signup(){
fetch(BASE + "/signup", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({
  username: u.value,
  password: p.value
})
})
.then(res => res.text())
.then(msg => {
  alert(msg);
});
}

function login(){
fetch(BASE + "/login", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({
  username: u.value,
  password: p.value
})
})
.then(res => res.json())
.then(d => {

  if(!d.token){
    alert("Login failed ❌");
    return;
  }

  localStorage.setItem("token", d.token);

  alert("Login success ✅");

  // ✅ redirect based on admin
  if(d.isAdmin){
    window.location = "admin.html";
  } else {
    window.location = "index.html";
  }

});
}

</script>
