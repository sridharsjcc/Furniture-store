<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <style>
    body {
      font-family: Arial;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px;
    }

    button {
      padding: 10px;
      width: 100%;
      background: orange;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Login</h2>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<script>

const BASE_URL = "https://furniturebackend-adua.onrender.com";

function login(){

fetch(BASE_URL + "/login",{
  method:"POST",
  headers:{
    "Content-Type":"application/json"
  },
  body:JSON.stringify({
    username:username.value,
    password:password.value
  })
})
.then(res=>res.json())
.then(data=>{

  if(data.token){
    localStorage.setItem("token", data.token);
    alert("Login success ✅");
    window.location = "index.html";
  } else {
    alert("Login failed ❌");
  }

});

}

</script>

</body>
</html>
