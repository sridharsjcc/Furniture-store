<!DOCTYPE html>
<html>
<head>
<title>Furniture Store</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f1f3f6;
}

/* HEADER */
.header{
  background:#131921;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.header a{
  color:white;
  text-decoration:none;
  margin-left:15px;
}

/* SEARCH */
.search-box{
  margin:20px;
  text-align:center;
}

.search-box input{
  width:60%;
  padding:10px;
}

/* PRODUCTS */
.container{
  padding:20px;
}

#products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 0 5px #ccc;
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:8px;
}

button{
  padding:8px;
  background:orange;
  border:none;
  cursor:pointer;
  margin-top:10px;
}

/* CART COUNT */
.cart-count{
  background:red;
  padding:3px 8px;
  border-radius:50%;
  font-size:12px;
}
</style>
</head>

<body>

<div class="header">
  <h2>🛒 Furniture Store</h2>

  <div>
    <a href="index.html">Home</a>
    <a href="login.html">Login</a>
    <a href="cart.html">Cart <span id="count" class="cart-count">0</span></a>
    <a href="admin.html">Admin</a>
  </div>
</div>

<div class="search-box">
  <input id="search" placeholder="Search furniture..." onkeyup="load()">
</div>

<div class="container">
  <div id="products"></div>
</div>

<script>

const BASE="https://furniturebackend-adua.onrender.com";
const token=localStorage.getItem("token");

// LOAD PRODUCTS
function load(){
fetch(BASE+"/products")
.then(r=>r.json())
.then(data=>{

let s = search.value.toLowerCase();

let html="";
data
.filter(p => p.name.toLowerCase().includes(s))
.forEach(p=>{

html+=`
<div class="card">
<img src="${p.image || 'https://images.unsplash.com/photo-1505691938895-1758d7feb511'}">
<h3>${p.name}</h3>
<p>₹${p.price}</p>
<button onclick='add(${JSON.stringify(p)})'>Add to Cart</button>
</div>`;
});

products.innerHTML=html;

});
}

// ADD TO CART
function add(p){

if(!token){
alert("Login first ❗");
return;
}

fetch(BASE+"/add-to-cart",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":token
},
body:JSON.stringify({product:p})
})
.then(res=>res.text())
.then(()=>{
alert("Added to cart ✅");
updateCartCount();
});

}

// CART COUNT
function updateCartCount(){

if(!token) return;

fetch(BASE+"/get-cart",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":token
}
})
.then(res=>res.json())
.then(data=>{
document.getElementById("count").innerText = data.length;
});

}

load();
updateCartCount();

</script>

</body>
</html>
