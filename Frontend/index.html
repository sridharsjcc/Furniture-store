<!DOCTYPE html>
<html>
<head>
<title>Furniture Store</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

/* HEADER */
.header{
  background:#fff;
  padding:10px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #ddd;
}

.logo{
  font-size:22px;
  font-weight:bold;
  color:orange;
}

.search{
  width:40%;
  padding:10px;
  border-radius:20px;
  border:1px solid #ccc;
}

.menu a{
  margin-left:15px;
  text-decoration:none;
  color:black;
}

/* CATEGORY */
.categories{
  display:flex;
  gap:15px;
  padding:15px;
  overflow:auto;
  background:#fff;
}

.cat{
  background:#fff3e0;
  padding:10px 15px;
  border-radius:20px;
  cursor:pointer;
  white-space:nowrap;
}

/* BANNER */
.banner{
  width:100%;
  height:300px;
  overflow:hidden;
}

.banner img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* PRODUCTS */
.section{
  padding:20px;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
}

.card{
  background:white;
  padding:10px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:8px;
}

.price{
  color:orange;
  font-weight:bold;
}

button{
  width:100%;
  padding:10px;
  background:orange;
  border:none;
  margin-top:10px;
  cursor:pointer;
}

/* FOOTER */
.footer{
  background:#131921;
  color:white;
  padding:20px;
  text-align:center;
  margin-top:30px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">🛋️ Furniture</div>

  <input class="search" placeholder="Search furniture...">

  <div class="menu">
    <a href="orders.html">Orders</a>
    <a href="cart.html">Cart</a>
    <a href="login.html">Login</a>
  </div>
</div>

<!-- CATEGORY -->
<div class="categories">
  <div class="cat">Living Room</div>
  <div class="cat">Bedroom</div>
  <div class="cat">Dining</div>
  <div class="cat">Study</div>
  <div class="cat">Storage</div>
</div>

<!-- BANNER -->
<div class="banner">
  <img id="bannerImg" src="https://assets.furlenco.com/s3-furlenco-images/evolve_2_0/jan26_banner_buy_desktop.jpg">
</div>

<!-- PRODUCTS -->
<div class="section">
  <h2>🔥 Deals of the Day</h2>
  <div class="products" id="products"></div>
</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 Furniture Store | Built by You 🚀
</div>

<script>

const BASE="https://furniturebackend-adua.onrender.com";
const token=localStorage.getItem("token");

/* 🔥 BANNER SLIDER */
const banners=[
"https://assets.furlenco.com/s3-furlenco-images/evolve_2_0/jan26_banner_buy_desktop.jpg",
"https://assets.furlenco.com/s3-furlenco-images/evolve_2_0/newbrand_genz_banner_buy_desktop_1.jpg",
"https://assets.furlenco.com/s3-furlenco-images/evolve_2_0/BUY_BANNERS_desktop_3.jpg",
"https://assets.furlenco.com/s3-furlenco-images/evolve_2_0/BUY_BANNERS_desktop_4.jpg"
];

let i=0;
setInterval(()=>{
  i=(i+1)%banners.length;
  document.getElementById("bannerImg").src=banners[i];
},3000);

/* 🔥 LOAD PRODUCTS */
fetch(BASE+"/products")
.then(res=>res.json())
.then(data=>{

let html="";

data.forEach(p=>{

html+=`
<div class="card">
<img src="${p.images?.[0] || p.image}" loading="lazy">

<h3>${p.name}</h3>
<p class="price">₹${p.price}</p>

<button onclick='addToCart(${JSON.stringify(p)})'>
Add to Cart
</button>
</div>
`;

});

products.innerHTML=html;

});

/* 🛒 ADD TO CART */
function addToCart(product){

if(!token){
  alert("Login first ❗");
  return location.href="login.html";
}

fetch(BASE+"/add-to-cart",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify({product})
})
.then(res=>res.text())
.then(msg=>alert(msg));

}

</script>

</body>
</html>
