<!DOCTYPE html>
<html>
<body>

<h2>Furniture Store</h2>

<input id="search" placeholder="Search..." onkeyup="load()">
<select id="filter" onchange="load()">
<option value="">All</option>
<option value="10000">Below 10k</option>
<option value="50000">Below 50k</option>
</select>

<div id="products"></div>

<script>

const token = localStorage.getItem("token");

function load(){

fetch("https://furniturebackend-adua.onrender.com/products")
.then(res=>res.json())
.then(data=>{

let s=search.value.toLowerCase();
let f=filter.value;

let html="";

data.filter(p=>{
return p.name.toLowerCase().includes(s) &&
(f? p.price<=f:true);
})
.forEach(p=>{
html+=`
<div>
<h3>${p.name}</h3>
<p>₹${p.price}</p>
<button onclick='add(${JSON.stringify(p)})'>Add</button>
</div>`;
});

products.innerHTML=html;

});
}

function add(p){
fetch("https://furniturebackend-adua.onrender.com/add-to-cart",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":token
},
body:JSON.stringify({product:p})
}).then(()=>alert("Added"));
}

load();

</script>

</body>
</html>
