<!DOCTYPE html>
<html>
<head>
<title>Furniture Store</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}

/* HEADER */
.header{
  background:#fff;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #ddd;
}

.logo{color:orange;font-size:22px;font-weight:bold}

.search{
  width:40%;
  padding:10px;
  border-radius:20px;
  border:1px solid #ccc;
}

.menu a{margin-left:15px;text-decoration:none;color:black;font-weight:bold}

/* CATEGORY */
.categories{
  display:flex;
  gap:15px;
  padding:15px;
  background:#fff;
  overflow:auto;
}

.cat{
  background:#fff3e0;
  padding:8px 15px;
  border-radius:20px;
  cursor:pointer;
}

/* FILTER BAR */
.filters{
  display:flex;
  gap:20px;
  padding:15px;
  background:white;
  align-items:center;
}

.range{
  display:flex;
  flex-direction:column;
}

/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:white;
  padding:10px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:8px;
}

.price{color:orange;font-weight:bold}

button{
  width:100%;
  padding:10px;
  background:orange;
  border:none;
  margin-top:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">🛋 Furniture</div>

  <input class="search" id="search" placeholder="Search furniture...">

  <div class="menu" id="menu"></div>
</div>

<!-- CATEGORY -->
<div class="categories">
  <div class="cat" onclick="setCategory('all')">All</div>
  <div class="cat" onclick="setCategory('sofa')">Sofa</div>
  <div class="cat" onclick="setCategory('bed')">Bed</div>
  <div class="cat" onclick="setCategory('table')">Table</div>
  <div class="cat" onclick="setCategory('chair')">Chair</div>
</div>

<!-- FILTERS -->
<div class="filters">

<div class="range">
<label>Max Price: ₹<span id="priceVal">100000</span></label>
<input type="range" id="priceRange" min="0" max="100000" value="100000">
</div>

<select id="sort">
<option value="">Sort</option>
<option value="low">Price Low → High</option>
<option value="high">Price High → Low</option>
</select>

</div>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<script>
const BASE="https://furniturebackend-adua.onrender.com";

let allProducts=[];
let currentCategory="all";
let maxPrice=100000;

// NAV
function getUser(){
const t=localStorage.getItem("token");
if(!t) return null;
try{return JSON.parse(atob(t.split('.')[1]));}catch{return null;}
}

function loadNav(){
const user=getUser();

if(!user){
menu.innerHTML=`<a href="login.html">Login</a><a href="cart.html">Cart</a>`;
return;
}

menu.innerHTML=`
<span>Hi ${user.username}</span>
<a href="cart.html">Cart</a>
<a href="orders.html">Orders</a>
${user.isAdmin?`<a href="admin.html">Admin</a>`:""}
<a href="#" onclick="logout()">Logout</a>`;
}

function logout(){
localStorage.removeItem("token");
location.reload();
}

loadNav();

// LOAD PRODUCTS
fetch(BASE+"/products")
.then(r=>r.json())
.then(data=>{
allProducts=data;
applyFilters();
});

// FILTER LOGIC
function applyFilters(){

let filtered=[...allProducts];

// CATEGORY
if(currentCategory!=="all"){
filtered=filtered.filter(p=>
p.category?.toLowerCase().includes(currentCategory)
);
}

// PRICE
filtered=filtered.filter(p=>p.price <= maxPrice);

// SEARCH
const searchVal=search.value.toLowerCase();
filtered=filtered.filter(p=>
p.name.toLowerCase().includes(searchVal)
);

// SORT
if(sort.value==="low"){
filtered.sort((a,b)=>a.price-b.price);
}
if(sort.value==="high"){
filtered.sort((a,b)=>b.price-a.price);
}

render(filtered);
}

// RENDER
function render(data){
products.innerHTML=data.map(p=>`
<div class="card">
<img src="${p.images?.[0]||p.image}">
<h3>${p.name}</h3>
<p class="price">₹${p.price}</p>

<button onclick="view('${p._id}')">View</button>
<button onclick='add(${JSON.stringify(p)})'>Add</button>
</div>`).join("");
}

// EVENTS
search.oninput=applyFilters;

priceRange.oninput=e=>{
maxPrice=e.target.value;
priceVal.innerText=maxPrice;
applyFilters();
};

sort.onchange=applyFilters;

function setCategory(cat){
currentCategory=cat;
applyFilters();
}

// VIEW
function view(id){
location.href="product.html?id="+id;
}

// ADD TO CART
function add(p){
const token=localStorage.getItem("token");

if(!token){
alert("Login first ❗");
return location.href="login.html";
}

fetch(BASE+"/add-to-cart",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify({product:p})
})
.then(()=>alert("Added 🛒"));
}

</script>

</body>
</html>
