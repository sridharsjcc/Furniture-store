<!DOCTYPE html>
<html>
<head>
<title>Furniture Store</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#f1f3f6;
}

.header{
  background:#131921;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.header a{
  color:white;
  text-decoration:none;
  margin-left:15px;
}

.search-box{
  margin:20px;
  text-align:center;
}

.search-box input{
  width:60%;
  padding:10px;
}

.container{
  padding:20px;
}

#products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  transform:scale(1.02);
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}

button{
  padding:8px;
  background:orange;
  border:none;
  cursor:pointer;
  margin-top:10px;
}

.cart-count{
  background:red;
  padding:3px 8px;
  border-radius:50%;
  font-size:12px;
}
</style>
</head>

<body>

<div class="header">
  <h2>🛒 Furniture Store</h2>
  <div id="nav"></div>
</div>

<div class="search-box">
  <input id="search" placeholder="Search..." onkeyup="load()">
</div>

<div class="container">
  <div id="products"></div>
</div>

<script>

const BASE="https://furniturebackend-adua.onrender.com";
const token=localStorage.getItem("token");

// ===== GET USER =====
function getUser(){
  try{
    return JSON.parse(atob(token.split('.')[1]));
  }catch{
    return null;
  }
}

// ===== NAV =====
function renderNav(){

let html = `<a href="index.html">Home</a>`;

if(!token){
  html += `<a href="login.html">Login</a>`;
}else{

  html += `<a href="#" onclick="logout()">Logout</a>`;
  html += `<a href="cart.html">Cart <span id="count" class="cart-count">0</span></a>`;

  const user = getUser();

  if(user && user.isAdmin){
    html += `<a href="admin.html">Admin</a>`;
  }
}

nav.innerHTML = html;
}

// ===== LOGOUT =====
function logout(){
  localStorage.removeItem("token");
  location.reload();
}

// ===== OPEN PRODUCT PAGE =====
function openProduct(id){
  window.location.href = "product.html?id=" + id;
}

// ===== LOAD PRODUCTS =====
function load(){
fetch(BASE+"/products")
.then(r=>r.json())
.then(data=>{

let s = search.value.toLowerCase();

let html="";

data
.filter(p => p.name.toLowerCase().includes(s))
.forEach(p=>{

const img = p.images ? p.images[0] : (p.image || "https://via.placeholder.com/150");

html+=`
<div class="card" onclick="openProduct(${p.id})">

<img src="${img}">

<h3>${p.name}</h3>
<p>₹${p.price}</p>

<button onclick='event.stopPropagation(); add(${JSON.stringify(p)})'>
Add to Cart
</button>

</div>`;
});

products.innerHTML=html;

});
}

// ===== ADD TO CART =====
function add(p){

if(!token){
alert("Login first ❗");
return;
}

fetch(BASE+"/add-to-cart",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":token
},
body:JSON.stringify({product:p})
})
.then(()=>{
alert("Added to cart 🛒");
updateCartCount();
});

}

// ===== CART COUNT (FIXED) =====
function updateCartCount(){

if(!token) return;

fetch(BASE+"/get-cart",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":token
}
})
.then(res=>res.json())
.then(data=>{

let totalQty = 0;

data.forEach(i=>{
  totalQty += i.qty;
});

const el=document.getElementById("count");
if(el) el.innerText = totalQty;

});
}

// ===== INIT =====
renderNav();
load();
updateCartCount();

</script>

</body>
</html>
