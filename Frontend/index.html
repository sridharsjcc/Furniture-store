<!DOCTYPE html>
<html>
<head>
<title>Furniture Store</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}

/* HEADER */
.header{
  background:#fff;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #ddd;
}

.logo{font-size:22px;font-weight:bold;color:orange}

.search{
  width:40%;
  padding:10px;
  border-radius:20px;
  border:1px solid #ccc;
}

.menu a{
  margin-left:15px;
  text-decoration:none;
  color:black;
  font-weight:bold;
}

/* CATEGORY */
.categories{
  display:flex;
  gap:15px;
  padding:15px;
  overflow:auto;
  background:#fff;
}

.cat{
  background:#fff3e0;
  padding:10px 15px;
  border-radius:20px;
  cursor:pointer;
  white-space:nowrap;
}

/* BANNER */
.banner img{
  width:100%;
  height:300px;
  object-fit:cover;
}

/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:white;
  padding:10px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:8px;
}

.price{color:orange;font-weight:bold}

button{
  width:100%;
  padding:10px;
  background:orange;
  border:none;
  margin-top:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">🛋 Furniture</div>

  <input class="search" id="search" placeholder="Search furniture...">

  <div class="menu" id="menu"></div>
</div>

<div class="categories">
  <div class="cat" onclick="filter('all')">All</div>
  <div class="cat" onclick="filter('sofa')">Sofa</div>
  <div class="cat" onclick="filter('bed')">Bed</div>
  <div class="cat" onclick="filter('table')">Table</div>
  <div class="cat" onclick="filter('chair')">Chair</div>
</div>

<div class="banner">
  <img id="banner">
</div>

<div class="products" id="products"></div>

<script>
const BASE="https://furniturebackend-adua.onrender.com";
let all=[];

// USER NAV
function getUser(){
  const token=localStorage.getItem("token");
  if(!token) return null;
  try{
    return JSON.parse(atob(token.split('.')[1]));
  }catch{return null;}
}

function loadNav(){
  const user=getUser();

  if(!user){
    menu.innerHTML=`
    <a href="login.html">Login</a>
    <a href="cart.html">Cart</a>`;
    return;
  }

  menu.innerHTML=`
  <span>Hi ${user.username}</span>
  <a href="cart.html">Cart</a>
  <a href="orders.html">Orders</a>
  ${user.isAdmin ? `<a href="admin.html">Admin</a>` : ""}
  <a href="#" onclick="logout()">Logout</a>`;
}

function logout(){
  localStorage.removeItem("token");
  location.reload();
}

loadNav();

// LOAD PRODUCTS
fetch(BASE+"/products")
.then(r=>r.json())
.then(d=>{
  all=d;
  render(d);
});

function render(data){
products.innerHTML=data.map(p=>`
<div class="card">
<img src="${p.images?.[0]||p.image}">
<h3>${p.name}</h3>
<p class="price">₹${p.price}</p>

<button onclick="view('${p._id}')">View</button>
<button onclick='add(${JSON.stringify(p)})'>Add</button>
</div>`).join("");
}

// FILTER
function filter(cat){
if(cat==="all") return render(all);
render(all.filter(p=>p.category?.toLowerCase().includes(cat)));
}

// SEARCH
search.oninput=e=>{
let v=e.target.value.toLowerCase();
render(all.filter(p=>p.name.toLowerCase().includes(v)));
};

// VIEW
function view(id){
location.href="product.html?id="+id;
}

// ADD
function add(p){
const token=localStorage.getItem("token");

if(!token){
alert("Login first ❗");
location.href="login.html";
return;
}

fetch(BASE+"/add-to-cart",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify({product:p})
})
.then(()=>alert("Added 🛒"));
}

// BANNER
const banners=[
"https://assets.furlenco.com/s3-furlenco-images/evolve_2_0/jan26_banner_buy_desktop.jpg",
"https://assets.furlenco.com/s3-furlenco-images/evolve_2_0/newbrand_genz_banner_buy_desktop_1.jpg"
];

let i=0;
setInterval(()=>{
i=(i+1)%banners.length;
banner.src=banners[i];
},3000);

banner.src=banners[0];

</script>

</body>
</html>
