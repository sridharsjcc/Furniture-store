<!DOCTYPE html>
<html>
<head>
<title>Furniture Store</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f1f3f6;
}

.header{
  background:#131921;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

.header a{
  color:white;
  text-decoration:none;
  margin-left:15px;
}

.container{
  padding:20px;
}

#products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 0 5px #ccc;
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:8px;
}

button{
  padding:8px;
  background:orange;
  border:none;
  cursor:pointer;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
  <h2>🛒 Furniture Store</h2>
  <div>
    <a href="index.html">Home</a>
    <a href="login.html">Login</a>
<a href="cart.html">Cart</a>
  </div>
</div>

<div class="container">

<input id="search" placeholder="Search..." onkeyup="load()">

<div id="products"></div>

</div>

<script>

const BASE="https://furniturebackend-adua.onrender.com";
const token=localStorage.getItem("token");

function load(){
fetch(BASE+"/products")
.then(r=>r.json())
.then(data=>{
let html="";
data.forEach(p=>{
html+=`
<div class="card">
<img src="${p.image}">
<h3>${p.name}</h3>
<p>₹${p.price}</p>
<button onclick='add(${JSON.stringify(p)})'>Add to Cart</button>
</div>`;
});
products.innerHTML=html;
});
}

function add(p){

if(!token){
alert("Login first ❗");
return;
}

fetch(BASE+"/add-to-cart",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":token
},
body:JSON.stringify({product:p})
})
.then(res=>res.text())
.then(msg=>{
alert("Added to cart ✅");
});

}

load();

</script>

</body>
</html>
