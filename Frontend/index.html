<!DOCTYPE html>
<html>
<body>

<h2>Store</h2>
<a href="login.html">Login</a>

<div id="products"></div>

<script>

const BASE="https://furniturebackend-adua.onrender.com";
const token=localStorage.getItem("token");

fetch(BASE+"/products")
.then(r=>r.json())
.then(data=>{
let html="";
data.forEach(p=>{
html+=`
<div>
<img src="${p.image}" width="150">
<h3>${p.name}</h3>
<p>${p.price}</p>
<button onclick='add(${JSON.stringify(p)})'>Add</button>
</div>`;
});
products.innerHTML=html;
});

function add(p){
fetch(BASE+"/add-to-cart",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":token
},
body:JSON.stringify({product:p})
});
}

</script>

</body>
</html>
