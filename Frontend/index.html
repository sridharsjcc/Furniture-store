<!DOCTYPE html>
<html>
<head>
  <title>Luxury Furniture Store</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f1f3f6;
    }

    /* HEADER */
    header {
      background: #131921;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h2 {
      margin: 0;
      color: gold;
    }

    .nav button {
      margin-left: 10px;
      padding: 8px 12px;
      border: none;
      cursor: pointer;
      border-radius: 5px;
      font-weight: bold;
    }

    .cart-btn { background: orange; }
    .logout-btn { background: red; color: white; }

    /* HERO */
    .hero {
      height: 250px;
      background: url("https://images.unsplash.com/photo-1505691938895-1758d7feb511") center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 28px;
      font-weight: bold;
    }

    /* FILTER BAR */
    .filters {
      padding: 15px;
      display: flex;
      gap: 10px;
      justify-content: center;
      background: white;
    }

    input, select {
      padding: 8px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    /* PRODUCTS */
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 8px;
    }

    .price {
      color: green;
      font-size: 18px;
      margin: 10px 0;
    }

    .add-btn {
      background: #ff6a00;
      color: white;
      padding: 10px;
      border: none;
      width: 100%;
      cursor: pointer;
      border-radius: 6px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>
  <h2>Luxury Furniture</h2>

  <div class="nav">
    <button class="cart-btn" onclick="goCart()">Cart 🛒</button>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</header>

<div class="hero">
  Premium Furniture Collection
</div>

<!-- 🔍 SEARCH + FILTER -->
<div class="filters">
  <input id="search" placeholder="Search products..." onkeyup="loadProducts()">

  <select id="filter" onchange="loadProducts()">
    <option value="">All Prices</option>
    <option value="10000">Below ₹10,000</option>
    <option value="50000">Below ₹50,000</option>
  </select>
</div>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<script>

const token = localStorage.getItem("token");

if(!token){
  alert("Login first ❌");
  window.location.href = "login.html";
}


// LOAD PRODUCTS
function loadProducts(){

  fetch("http://localhost:3000/products")
  .then(res => res.json())
  .then(data => {

    const search = document.getElementById("search").value.toLowerCase();
    const filter = document.getElementById("filter").value;

    let html = "";

    data
    .filter(p => {

      const matchName = p.name.toLowerCase().includes(search);
      const matchPrice = filter ? p.price <= Number(filter) : true;

      return matchName && matchPrice;
    })
    .forEach(p => {

      html += `
        <div class="card">
          <img src="${getImage(p.name)}">
          <h3>${p.name}</h3>
          <div class="price">₹${p.price}</div>
          <button class="add-btn" onclick='addToCart(${JSON.stringify(p)})'>
            Add to Cart
          </button>
        </div>
      `;
    });

    document.getElementById("products").innerHTML = html;

  });
}


// ADD TO CART
function addToCart(product){

  fetch("http://localhost:3000/add-to-cart", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    },
    body: JSON.stringify({ product })
  })
  .then(res => res.text())
  .then(msg => alert(msg));
}


// NAVIGATION
function goCart(){
  window.location.href = "cart.html";
}

function logout(){
  localStorage.clear();
  window.location.href = "login.html";
}


// IMAGE AUTO
function getImage(name){
  if(name.toLowerCase().includes("sofa")){
    return "https://images.unsplash.com/photo-1586023492125-27b2c045efd7";
  }
  if(name.toLowerCase().includes("chair")){
    return "https://images.unsplash.com/photo-1503602642458-232111445657";
  }
  if(name.toLowerCase().includes("table")){
    return "https://images.unsplash.com/photo-1555041469-a586c61ea9bc";
  }
  return "https://images.unsplash.com/photo-1505691938895-1758d7feb511";
}


// INITIAL LOAD
loadProducts();

</script>

</body>
</html>
