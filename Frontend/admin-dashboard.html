<!DOCTYPE html>
<html>
<head>
  <title>Admin Analytics</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
    }

    header {
      background: black;
      padding: 15px;
      font-size: 22px;
      color: gold;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    .cards {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .card {
      flex: 1;
      min-width: 200px;
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 0 10px rgba(255,215,0,0.2);
    }

    .card h2 {
      margin: 10px 0;
      color: gold;
    }

    .chart-box {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 10px;
    }

    button {
      padding: 10px 15px;
      margin-top: 20px;
      background: gold;
      border: none;
      cursor: pointer;
      border-radius: 6px;
      font-weight: bold;
    }

  </style>
</head>

<body>

<header>📊 Admin Analytics Dashboard</header>

<div class="container">

  <!-- CARDS -->
  <div class="cards">
    <div class="card">
      <h3>Users</h3>
      <h2 id="users">0</h2>
    </div>

    <div class="card">
      <h3>Orders</h3>
      <h2 id="orders">0</h2>
    </div>

    <div class="card">
      <h3>Revenue</h3>
      <h2 id="revenue">₹0</h2>
    </div>
  </div>

  <!-- CHART -->
  <div class="chart-box">
    <canvas id="chart"></canvas>
  </div>

  <!-- REFRESH -->
  <button onclick="load()">Refresh Data</button>

</div>

<script>

// 🔐 AUTH CHECK
const token = localStorage.getItem("token");

if(!token){
  alert("Login required ❌");
  window.location.href = "login.html";
}


// LOAD DASHBOARD DATA
function load(){

  fetch("http://localhost:3000/dashboard", {
    headers: {
      "Authorization": token
    }
  })
  .then(res => res.json())
  .then(data => {

    // UPDATE CARDS
    document.getElementById("users").innerText = data.users;
    document.getElementById("orders").innerText = data.orders;
    document.getElementById("revenue").innerText = "₹" + data.revenue;

    // DRAW CHART
    drawChart(data);

  })
  .catch(() => {
    alert("Error loading dashboard ❌");
  });

}


// CHART FUNCTION
function drawChart(data){

  const ctx = document.getElementById("chart");

  new Chart(ctx, {
    type: "bar",
    data: {
      labels: ["Users", "Orders", "Revenue"],
      datasets: [{
        label: "Analytics",
        data: [data.users, data.orders, data.revenue]
      }]
    },
    options: {
      plugins: {
        legend: {
          labels: { color: "white" }
        }
      },
      scales: {
        x: {
          ticks: { color: "white" }
        },
        y: {
          ticks: { color: "white" }
        }
      }
    }
  });

}


// INITIAL LOAD
load();

</script>

</body>
</html>
