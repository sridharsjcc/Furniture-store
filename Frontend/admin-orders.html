<!DOCTYPE html>
<html>
<head>
  <title>Order Management</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
    }

    header {
      background: black;
      padding: 15px;
      font-size: 22px;
      color: gold;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    .order {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 0 10px rgba(255,215,0,0.2);
    }

    .status {
      margin-top: 10px;
      font-weight: bold;
      color: lightgreen;
    }

    button {
      margin: 5px;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .accept { background: #4CAF50; color: white; }
    .ship { background: orange; color: white; }
    .deliver { background: gold; }

  </style>
</head>

<body>

<header>📦 Order Management</header>

<div class="container">

  <div id="orders"></div>

</div>

<script>

// 🔐 AUTH
const token = localStorage.getItem("token");

if(!token){
  alert("Login required ❌");
  window.location.href = "login.html";
}


// LOAD ORDERS
function loadOrders(){

  fetch("http://localhost:3000/all-orders", {
    headers: { "Authorization": token }
  })
  .then(res => res.json())
  .then(data => {

    let html = "";

    if(data.length === 0){
      html = "<h3>No orders yet 📭</h3>";
    }

    data.forEach(o => {

      let items = "";

      o.items.forEach(i => {
        items += `<li>${i.name} x ${i.qty} (₹${i.price})</li>`;
      });

      html += `
        <div class="order">

          <b>Order ID:</b> ${o.id}<br>
          <b>User:</b> ${o.username}<br>
          <b>Date:</b> ${o.date}<br>

          <b>Items:</b>
          <ul>${items}</ul>

          <div class="status">Status: ${o.status}</div>

          <button class="accept" onclick="update(${o.id}, 'Accepted')">Accept</button>
          <button class="ship" onclick="update(${o.id}, 'Shipped')">Ship</button>
          <button class="deliver" onclick="update(${o.id}, 'Delivered')">Deliver</button>

        </div>
      `;
    });

    document.getElementById("orders").innerHTML = html;

  })
  .catch(() => {
    alert("Error loading orders ❌");
  });

}


// UPDATE STATUS
function update(id, status){

  fetch("http://localhost:3000/update-order", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    },
    body: JSON.stringify({ id, status })
  })
  .then(() => loadOrders());

}


// AUTO LOAD
loadOrders();

</script>

</body>
</html>
