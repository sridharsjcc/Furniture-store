<!DOCTYPE html>
<html>
<head>
<title>Cart</title>

<style>
body{margin:0;font-family:Arial;background:#f1f3f6;}

header{
  background:#131921;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

a{color:white;text-decoration:none;}

.container{display:flex;gap:20px;padding:20px;}
.left{flex:2;}
.right{flex:1;}

.item{
  display:flex;
  gap:15px;
  background:white;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}

.item img{
  width:120px;
  height:90px;
  object-fit:cover;
}

button{
  padding:5px 10px;
  margin:3px;
  cursor:pointer;
}

.summary{
  background:white;
  padding:20px;
  border-radius:10px;
}

.checkout{
  width:100%;
  padding:12px;
  background:orange;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  🛒 Cart
  <a href="index.html">Home</a>
</header>

<div class="container">

<div class="left" id="cartItems"></div>

<div class="right">
<div class="summary">
<h3>Price Details</h3>

<p>Subtotal: ₹<span id="subtotal">0</span></p>
<p>GST: ₹<span id="gst">0</span></p>
<p>Delivery: ₹<span id="delivery">0</span></p>

<h3>Total: ₹<span id="total">0</span></h3>

<button class="checkout" onclick="checkout()">Proceed to Payment</button>
</div>
</div>

</div>

<script>

const BASE="https://furniturebackend-adua.onrender.com";
const token=localStorage.getItem("token");

if(!token){
  alert("Login first ❗");
  location.href="login.html";
}

// LOAD CART
async function load(){
try{
  const res = await fetch(BASE+"/get-cart",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    }
  });

  const data = await res.json();
  render(data);

}catch{
  cartItems.innerHTML="<h2>Failed to load cart ❌</h2>";
}
}

// RENDER
function render(data){

if(!data.length){
cartItems.innerHTML="<h2>Your cart is empty 🛒</h2>";
subtotal.innerText=0;
gst.innerText=0;
delivery.innerText=0;
total.innerText=0;
return;
}

let html="";
let sub=0;

data.forEach(i=>{
sub += i.price * i.qty;

html += `
<div class="item">
<img src="${i.image}">
<div>
<h3>${i.name}</h3>
<p>₹${i.price}</p>

<button onclick="dec('${i.id}')">-</button>
${i.qty}
<button onclick="inc('${i.id}')">+</button>

<button onclick="removeItem('${i.id}')">❌ Remove</button>
</div>
</div>`;
});

cartItems.innerHTML=html;

let gstVal=Math.round(sub*0.18);
let deliveryVal=sub>0?500:0;

subtotal.innerText=sub;
gst.innerText=gstVal;
delivery.innerText=deliveryVal;
total.innerText=sub+gstVal+deliveryVal;
}

// ACTIONS
function inc(id){
fetch(BASE+"/inc",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify({id})
}).then(load);
}

function dec(id){
fetch(BASE+"/dec",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify({id})
}).then(load);
}

function removeItem(id){
fetch(BASE+"/remove",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify({id})
}).then(load);
}

// 👉 ONLY REDIRECT (NO ORDER HERE)
function checkout(){
  window.location.href="payment.html";
}

load();

</script>

</body>
</html>
