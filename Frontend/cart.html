<!DOCTYPE html>
<html>
<head>
  <title>Cart</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f1f3f6;
    }

    header {
      background: #131921;
      color: white;
      padding: 15px;
      font-size: 22px;
    }

    .container {
      display: flex;
      gap: 20px;
      padding: 20px;
    }

    .left { flex: 2; }
    .right { flex: 1; }

    .item {
      display: flex;
      gap: 15px;
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .item img {
      width: 120px;
      border-radius: 8px;
    }

    .name { font-weight: bold; }
    .price { color: green; }

    button {
      padding: 6px 10px;
      margin: 3px;
      cursor: pointer;
    }

    .summary {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .checkout {
      width: 100%;
      padding: 12px;
      background: orange;
      border: none;
      font-size: 16px;
      cursor: pointer;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<header>🛒 Your Cart</header>

<div class="container">

  <div class="left" id="cartItems"></div>

  <div class="right">
    <div class="summary">
      <h3>Price Details</h3>

      <p>Subtotal: <span id="subtotal">₹0</span></p>
      <p>GST (18%): <span id="gst">₹0</span></p>
      <p>Transport: <span id="delivery">₹0</span></p>

      <h3>Total: <span id="total">₹0</span></h3>

      <button class="checkout" onclick="goCheckout()">Proceed</button>
    </div>
  </div>

</div>

<script>

const token = localStorage.getItem("token");

fetch("http://localhost:3000/get-cart", {
  method:"POST",
  headers:{
    "Content-Type":"application/json",
    "Authorization":token
  }
})
.then(res=>res.json())
.then(data=>render(data));

function render(data){

  let html="";
  let subtotal=0;

  data.forEach(i=>{
    subtotal+=i.price*i.qty;

    html+=`
    <div class="item">
      <img src="${getImage(i.name)}">
      <div>
        <div class="name">${i.name}</div>
        <div class="price">₹${i.price}</div>
        <div>
          <button onclick="dec(${i.id})">-</button>
          ${i.qty}
          <button onclick="inc(${i.id})">+</button>
        </div>
      </div>
    </div>`;
  });

  document.getElementById("cartItems").innerHTML=html;

  let gst=Math.round(subtotal*0.18);
  let delivery=subtotal>0?500:0;
  let total=subtotal+gst+delivery;

  subtotalEl=subtotal;
  document.getElementById("subtotal").innerText="₹"+subtotal;
  document.getElementById("gst").innerText="₹"+gst;
  document.getElementById("delivery").innerText="₹"+delivery;
  document.getElementById("total").innerText="₹"+total;
}

function inc(id){
  fetch("http://localhost:3000/inc",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":token
    },
    body:JSON.stringify({id})
  }).then(()=>location.reload());
}

function dec(id){
  fetch("http://localhost:3000/dec",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":token
    },
    body:JSON.stringify({id})
  }).then(()=>location.reload());
}

function goCheckout(){
  window.location.href="checkout.html";
}

function getImage(name){
  return "https://images.unsplash.com/photo-1505691938895-1758d7feb511";
}

</script>

</body>
</html>
