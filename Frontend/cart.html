<!DOCTYPE html>
<html>
<head>
<title>Cart</title>

<style>
body{margin:0;font-family:Arial;background:#f1f3f6;}

header{
  background:#131921;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

a{color:white;text-decoration:none;}

.container{display:flex;gap:20px;padding:20px;}
.left{flex:2;}
.right{flex:1;}

.item{
  display:flex;
  gap:15px;
  background:white;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}

.item img{
  width:120px;
  height:90px;
  object-fit:cover;
}

button{
  padding:5px 10px;
  margin:3px;
  cursor:pointer;
}

.summary{
  background:white;
  padding:20px;
  border-radius:10px;
}

.checkout{
  width:100%;
  padding:12px;
  background:orange;
  border:none;
  cursor:pointer;
}

.empty{
  text-align:center;
  margin-top:50px;
  font-size:18px;
}
</style>
</head>

<body>

<header>
  🛒 Cart
  <a href="index.html">Home</a>
</header>

<div class="container">

<div class="left" id="cartItems"></div>

<div class="right">
<div class="summary">
<h3>Price Details</h3>

<p>Subtotal: ₹<span id="subtotal">0</span></p>
<p>GST (18%): ₹<span id="gst">0</span></p>
<p>Delivery: ₹<span id="delivery">0</span></p>

<h3>Total: ₹<span id="total">0</span></h3>

<button class="checkout" onclick="checkout()">Checkout</button>
</div>
</div>

</div>

<script>

const BASE="https://furniturebackend-adua.onrender.com";
const token=localStorage.getItem("token");

// 🔐 LOGIN CHECK
if(!token){
  alert("Login first ❗");
  location.href="login.html";
}

// LOAD CART
function load(){
fetch(BASE+"/get-cart",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":token
}
})
.then(r=>r.json())
.then(data=>render(data))
.catch(()=>{
cartItems.innerHTML="<h2>Failed to load cart ❌</h2>";
});
}

// RENDER CART
function render(data){

if(!data.length){
cartItems.innerHTML="<div class='empty'>Your cart is empty 🛒</div>";

document.getElementById("subtotal").innerText=0;
document.getElementById("gst").innerText=0;
document.getElementById("delivery").innerText=0;
document.getElementById("total").innerText=0;

return;
}

let html="";
let subtotal=0;

data.forEach(i=>{

subtotal += i.price * i.qty;

html += `
<div class="item">
<img src="${i.image || 'https://via.placeholder.com/150'}">

<div>
<h3>${i.name}</h3>
<p>₹${i.price}</p>

<div>
<button onclick="dec(${i.id})">-</button>
${i.qty}
<button onclick="inc(${i.id})">+</button>
</div>

<button onclick="removeItem(${i.id})">❌ Remove</button>
</div>

</div>`;
});

cartItems.innerHTML = html;

// CALCULATIONS
let gst=Math.round(subtotal*0.18);
let delivery=subtotal>0?500:0;
let total=subtotal+gst+delivery;

// UPDATE UI
document.getElementById("subtotal").innerText=subtotal;
document.getElementById("gst").innerText=gst;
document.getElementById("delivery").innerText=delivery;
document.getElementById("total").innerText=total;

}

// INCREASE
function inc(id){
fetch(BASE+"/inc",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":token
},
body:JSON.stringify({id})
}).then(load);
}

// DECREASE
function dec(id){
fetch(BASE+"/dec",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":token
},
body:JSON.stringify({id})
}).then(load);
}

// REMOVE
function removeItem(id){
fetch(BASE+"/remove",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":token
},
body:JSON.stringify({id})
}).then(load);
}

// ✅ CHECKOUT (REAL FIX)
function checkout(){

fetch(BASE+"/place-order",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":token
}
})
.then(res=>res.text())
.then(msg=>{
alert(msg);
load(); // refresh cart
});

}

// INIT
load();

</script>

</body>
</html>
