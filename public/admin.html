<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{font-family:Arial;margin:0;background:#f1f3f6;}
.header{
  background:#131921;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
}
.container{padding:20px;}
.box{
  background:white;
  padding:20px;
  border-radius:10px;
  width:300px;
}
input{
  width:100%;
  padding:10px;
  margin:10px 0;
}
button{
  padding:10px;
  width:100%;
}
.card{
  background:white;
  padding:10px;
  margin:10px 0;
}
</style>
</head>

<body>

<div class="header">
<h2>👑 Admin Panel</h2>
</div>

<div class="container">

<div class="box">
<h3>Add Product</h3>

<input id="name" placeholder="Product name">
<input id="price" placeholder="Price">
<input id="image" placeholder="Image URL">

<button onclick="addProduct()">Add Product</button>
</div>

<div>
<h3>Products</h3>
<div id="list"></div>
</div>

</div>

<script>

const BASE="https://furniturebackend-adua.onrender.com";
const token=localStorage.getItem("token");

// CHECK ADMIN
function getUser(){
  try{
    return JSON.parse(atob(token.split('.')[1]));
  }catch{
    return null;
  }
}

const user=getUser();

if(!token || !user || !user.isAdmin){
  alert("Admin only ❌");
  location.href="index.html";
}

// ADD PRODUCT
function addProduct(){

const n = name.value.trim();
const p = Number(price.value.trim());
const i = image.value.trim();

if(!n || !p || !i){
  alert("Fill all fields ❌");
  return;
}

fetch(BASE+"/add-product",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization": "Bearer " + token   // ✅ FIX
},
body:JSON.stringify({
name:n,
price:p,
image:i
})
})
.then(res=>res.text())
.then(msg=>{
alert(msg);
load();
});
}

// LOAD PRODUCTS
function load(){
fetch(BASE+"/products")
.then(res=>res.json())
.then(data=>{
let html="";
data.forEach(p=>{
html+=`
<div class="card">
<img src="${p.image}" width="100"><br>
<b>${p.name}</b><br>
₹${p.price}
</div>`;
});
list.innerHTML=html;
});
}

load();

</script>

</body>
</html>
