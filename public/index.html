<!DOCTYPE html>
<html>
<head>
<title>Furniture Store</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#fff;
}

/* HEADER */
header{
  background:white;
  padding:15px 30px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.logo{
  font-size:22px;
  font-weight:bold;
  color:orange;
}

.search{
  width:40%;
  padding:10px;
  border:1px solid #ddd;
  border-radius:5px;
}

.nav a{
  margin-left:20px;
  text-decoration:none;
  color:black;
  font-weight:bold;
}

/* CATEGORY MENU */
.categories{
  display:flex;
  gap:20px;
  padding:10px 30px;
  background:#fff5e6;
  overflow-x:auto;
}

.categories div{
  cursor:pointer;
  font-weight:bold;
}

/* BANNER */
.banner img{
  width:100%;
  height:300px;
  object-fit:cover;
}

/* SECTION */
.section{
  padding:20px;
}

.section h2{
  margin-bottom:15px;
}

/* PRODUCTS GRID */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
}

.card{
  border:1px solid #eee;
  border-radius:10px;
  padding:10px;
  background:white;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.03);
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
}

.price{
  color:orange;
  font-weight:bold;
}

button{
  background:orange;
  color:white;
  border:none;
  padding:8px;
  width:100%;
  margin-top:10px;
  cursor:pointer;
}

/* FOOTER */
footer{
  background:#f8f8f8;
  padding:20px;
  text-align:center;
  margin-top:30px;
}
</style>

</head>

<body>

<header>
  <div class="logo">🛋 Furniture</div>

  <input class="search" placeholder="Search furniture...">

  <div class="nav">
    <a href="cart.html">Cart</a>
    <a href="orders.html">Orders</a>
  </div>
</header>

<!-- CATEGORY -->
<div class="categories">
  <div>Living Room</div>
  <div>Bedroom</div>
  <div>Dining</div>
  <div>Study</div>
  <div>Storage</div>
  <div>Kids</div>
  <div>Deals</div>
</div>

<!-- BANNER -->
<div class="banner">
  <img src="https://assets.furlenco.com/s3-furlenco-images/evolve_2_0/jan26_banner_buy_desktop.jpg">
</div>

<!-- DEALS -->
<div class="section">
  <h2>🔥 Deals of the Day</h2>
  <div class="products" id="products"></div>
</div>

<footer>
  © 2026 Furniture Store | Orange Theme
</footer>

<script>

const BASE="https://furniturebackend-adua.onrender.com";

// LOAD PRODUCTS
fetch(BASE+"/products")
.then(res=>res.json())
.then(data=>{

let html="";

data.forEach(p=>{

html+=`
<div class="card">
<img src="${p.images?.[0] || p.image || 'https://via.placeholder.com/200'}">

<h3>${p.name || "No Name"}</h3>

<p class="price">₹${p.price || 0}</p>

<button onclick='addToCart(${JSON.stringify(p)})'>Add to Cart</button>
</div>
`;

});

products.innerHTML=html;

})
.catch(()=>{
products.innerHTML="<h3>Failed to load products ❌</h3>";
});

// ADD TO CART
function addToCart(p){

const token=localStorage.getItem("token");

if(!token){
alert("Login first ❗");
location.href="login.html";
return;
}

fetch(BASE+"/add-to-cart",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + token
},
body:JSON.stringify({product:p})
})
.then(res=>res.text())
.then(msg=>alert(msg));

}

</script>

</body>
</html>
