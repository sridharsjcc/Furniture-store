<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#f1f3f6;
}

.box{
  background:white;
  padding:20px;
  border-radius:10px;
  width:300px;
  text-align:center;
}

input{
  width:90%;
  padding:10px;
  margin:10px;
}

button{
  padding:10px;
  width:100%;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="box">
<h2>Login</h2>

<input id="u" placeholder="Username">
<input id="p" type="password" placeholder="Password">

<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
<br><br>
<a href="index.html">⬅ Back to Home</a>
</div>

<script>

const BASE="https://furniturebackend-adua.onrender.com";

function signup(){
fetch(BASE+"/signup",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:u.value,password:p.value})
})
.then(r=>r.text())
.then(alert);
}

function login(){
fetch(BASE+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:u.value,password:p.value})
})
.then(r=>r.json())
.then(d=>{
if(d.token){
localStorage.setItem("token",d.token);
alert("Login success ✅");
location.href="index.html";
}else{
alert("Invalid login ❌");
}
});
}

</script>

</body>
</html>
