<!DOCTYPE html>
<html>
<head>
<title>Cart</title>

<style>
body{margin:0;font-family:Arial;background:#f1f3f6}

header{
background:#131921;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

a{color:white;text-decoration:none}

.container{
display:flex;
gap:20px;
padding:20px;
}

.left{flex:2}
.right{flex:1}

.item{
display:flex;
gap:15px;
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

.item img{
width:120px;
height:90px;
object-fit:cover;
}

button{
padding:5px 10px;
margin:3px;
cursor:pointer;
}

.summary{
background:white;
padding:20px;
border-radius:10px;
}

.checkout{
width:100%;
padding:12px;
background:orange;
border:none;
cursor:pointer;
}

.empty{
text-align:center;
margin-top:50px;
}
</style>
</head>

<body>

<header>
🛒 Cart
<a href="index.html">Home</a>
</header>

<div class="container">

<div class="left" id="items"></div>

<div class="right">
<div class="summary">

<h3>Price Details</h3>

<p>Subtotal: ₹<span id="subtotal">0</span></p>
<p>GST (18%): ₹<span id="gst">0</span></p>
<p>Delivery: ₹<span id="delivery">0</span></p>

<h3>Total: ₹<span id="total">0</span></h3>

<button class="checkout" onclick="checkout()">Checkout</button>

</div>
</div>

</div>

<script>

const BASE="https://furniturebackend-adua.onrender.com";
const token=localStorage.getItem("token");

if(!token){
alert("Login first ❗");
location.href="login.html";
}

// LOAD CART
function load(){
fetch(BASE+"/get-cart",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
}
})
.then(r=>r.json())
.then(data=>render(data))
.catch(()=>{
items.innerHTML="<h2>Failed to load cart ❌</h2>";
});
}

// RENDER
function render(data){

if(!data.length){
items.innerHTML="<div class='empty'>Cart is empty 🛒</div>";
subtotal.innerText=0;
gst.innerText=0;
delivery.innerText=0;
total.innerText=0;
return;
}

let html="";
let sub=0;

data.forEach(i=>{
sub += i.price*i.qty;

html+=`
<div class="item">
<img src="${i.image}">
<div>
<h3>${i.name}</h3>
<p>₹${i.price}</p>

<div>
<button onclick="dec('${i.id}')">-</button>
${i.qty}
<button onclick="inc('${i.id}')">+</button>
</div>

<button onclick="removeItem('${i.id}')">❌ Remove</button>
</div>
</div>`;
});

items.innerHTML=html;

let gstVal=Math.round(sub*0.18);
let deliveryVal=sub>0?500:0;

subtotal.innerText=sub;
gst.innerText=gstVal;
delivery.innerText=deliveryVal;
total.innerText=sub+gstVal+deliveryVal;
}

// ACTIONS
function inc(id){
fetch(BASE+"/inc",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify({id})
}).then(load);
}

function dec(id){
fetch(BASE+"/dec",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify({id})
}).then(load);
}

function removeItem(id){
fetch(BASE+"/remove",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify({id})
}).then(load);
}

// CHECKOUT
function checkout(){
fetch(BASE+"/place-order",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
}
})
.then(r=>r.text())
.then(msg=>{
alert(msg);
load();
});
}

load();

</script>

</body>
</html>
