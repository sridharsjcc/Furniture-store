<!DOCTYPE html>
<html>
<head>
<title>Cart</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
header{padding:15px;background:#131921;color:white}

.item{display:flex;gap:10px;background:white;margin:10px;padding:10px}

img{width:100px}

button{margin:3px}
</style>
</head>

<body>

<header>🛒 Cart <a href="index.html" style="color:white">Home</a></header>

<div id="items"></div>

<h2>Total: ₹<span id="total">0</span></h2>

<script>

const BASE="https://furniturebackend-adua.onrender.com";
const token=localStorage.getItem("token");

function load(){
fetch(BASE+"/get-cart",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
}
})
.then(r=>r.json())
.then(data=>{

let t=0;

items.innerHTML=data.map(i=>{
t+=i.price*i.qty;

return `
<div class="item">
<img src="${i.image}">
<div>
<h3>${i.name}</h3>
<p>₹${i.price}</p>

<button onclick="dec('${i.id}')">-</button>
${i.qty}
<button onclick="inc('${i.id}')">+</button>

<button onclick="remove('${i.id}')">❌</button>
</div>
</div>`;
}).join("");

total.innerText=t;

});
}

function inc(id){
fetch(BASE+"/inc",{method:"POST",
headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},
body:JSON.stringify({id})}).then(load);
}

function dec(id){
fetch(BASE+"/dec",{method:"POST",
headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},
body:JSON.stringify({id})}).then(load);
}

function remove(id){
fetch(BASE+"/remove",{method:"POST",
headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},
body:JSON.stringify({id})}).then(load);
}

load();

</script>

</body>
</html>
