<!DOCTYPE html>
<html>
<head>
<title>Product</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}

header{padding:15px;background:white}

.container{display:flex;gap:40px;padding:40px}

img{border-radius:10px}

.left img{width:400px}
.thumbs img{width:70px;cursor:pointer;margin:5px}

.right{max-width:400px}
.price{color:orange;font-size:22px}

button{
background:orange;color:white;
padding:12px;border:none;width:100%;margin-top:10px
}
</style>
</head>

<body>

<header><a href="index.html">← Back</a></header>

<div class="container">

<div class="left">
<img id="main">
<div id="thumbs"></div>
</div>

<div class="right">
<h2 id="name"></h2>
<p class="price" id="price"></p>
<p id="desc"></p>
<button onclick="add()">Add to Cart</button>
</div>

</div>

<script>

const BASE="https://furniturebackend-adua.onrender.com";
const id=new URLSearchParams(location.search).get("id");

let product={};

fetch(BASE+"/product/"+id)
.then(r=>r.json())
.then(p=>{
product=p;

name.innerText=p.name;
price.innerText="₹"+p.price;
desc.innerText=p.description||"";

let imgs=p.images?.length?p.images:[p.image];

main.src=imgs[0];

thumbs.innerHTML=imgs.map(i=>
`<img src="${i}" onclick="main.src='${i}'">`
).join("");
});

function add(){
const token=localStorage.getItem("token");
fetch(BASE+"/add-to-cart",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify({product})
}).then(()=>alert("Added 🛒"));
}

</script>

</body>
</html>
