<!DOCTYPE html>
<html>
<head>
<title>Product</title>

<style>
body{font-family:Arial;margin:0;background:#f1f3f6;}
.header{background:#131921;color:white;padding:15px;}
.container{display:flex;gap:40px;padding:40px;}
.left img{width:400px;border-radius:10px;}
.thumbs img{width:80px;margin:5px;cursor:pointer;}
button{padding:12px;background:orange;border:none;margin-top:20px;}
</style>

</head>

<body>

<div class="header">
<h2>🛒 Furniture Store</h2>
<a href="index.html" style="color:white">Home</a>
</div>

<div class="container">

<div class="left">
<img id="mainImg">
<div id="thumbs"></div>
</div>

<div>
<h2 id="name"></h2>
<h3 id="price"></h3>
<p id="desc"></p>

<button onclick="add()">Add to Cart</button>
</div>

</div>

<script>

const BASE="https://furniturebackend-adua.onrender.com";
const token=localStorage.getItem("token");

const id=new URLSearchParams(location.search).get("id");

let product={};

fetch(BASE+"/product/"+id)
.then(res=>res.json())
.then(p=>{

if(!p || !p._id){
document.body.innerHTML="<h2>Product not found ❌</h2>";
return;
}

product=p;

name.innerText=p.name;
price.innerText="₹"+p.price;
desc.innerText=p.description;

let imgs=p.images?.length ? p.images : [p.image];

mainImg.src=imgs[0];

thumbs.innerHTML=imgs.map(i=>`
<img src="${i}" onclick="mainImg.src='${i}'">
`).join("");

});

// ADD
function add(){

if(!token){
alert("Login first ❗");
return location.href="login.html";
}

fetch(BASE+"/add-to-cart",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify({product})
})
.then(res=>res.text())
.then(msg=>alert(msg));
}

</script>

</body>
</html>
